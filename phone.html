<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Control Remoto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --font:'Google Sans','Product Sans','Inter',sans-serif;
      --bg:#0c0c0f;--card:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.07);
      --accent:#6c8cff;--accent2:#a78bfa;--green:#4ade80;--danger:#ff6b6b;--orange:#fb923c;
      --c1:rgba(255,255,255,0.92);--c2:rgba(255,255,255,0.55);--c3:rgba(255,255,255,0.3);
      --ease:cubic-bezier(0.4,0,0.2,1);
    }
    html,body{width:100%;min-height:100%;font-family:var(--font);background:var(--bg);color:var(--c1);-webkit-tap-highlight-color:transparent;}
    .app{max-width:420px;margin:0 auto;padding:20px 16px 40px;display:flex;flex-direction:column;gap:14px;}

    /* Header */
    .header{display:flex;align-items:center;gap:12px;padding:8px 0;}
    .header-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);animation:dotPulse 2s ease-in-out infinite;}
    @keyframes dotPulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--accent)}50%{opacity:.5;box-shadow:0 0 2px var(--accent)}}
    .header h1{font-size:18px;font-weight:500;letter-spacing:-.3px}
    .header-sub{font-size:12px;color:var(--c3);margin-left:auto}

    /* Cards */
    .card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:20px;transition:all .3s var(--ease)}
    .card-title{font-size:11px;font-weight:500;color:var(--c3);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .card-title .icon{font-size:14px}

    /* Inputs */
    .input-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    .input-label{font-size:12px;color:var(--c2)}
    .input-field{
      width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--card-border);
      background:rgba(255,255,255,0.03);color:var(--c1);font-family:var(--font);font-size:15px;
      outline:none;transition:border-color .3s;
    }
    .input-field:focus{border-color:var(--accent)}
    .input-field::placeholder{color:var(--c3)}
    input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(.6)}

    /* Buttons */
    .btn{
      padding:11px 16px;border-radius:12px;border:none;cursor:pointer;
      font-family:var(--font);font-size:14px;font-weight:500;
      transition:all .25s var(--ease);display:inline-flex;align-items:center;justify-content:center;gap:6px;
    }
    .btn:active{transform:scale(.96)}
    .btn-primary{background:var(--accent);color:#fff;flex:1}
    .btn-primary:hover{background:#5a7aee;box-shadow:0 4px 20px rgba(108,140,255,0.3)}
    .btn-danger{background:rgba(255,107,107,0.15);color:var(--danger)}
    .btn-danger:hover{background:rgba(255,107,107,0.25)}
    .btn-sm{padding:8px 14px;font-size:12px;border-radius:10px}
    .btn-ghost{background:rgba(255,255,255,0.06);color:var(--c2)}
    .btn-ghost:hover{background:rgba(255,255,255,0.1);color:var(--c1)}
    .btn-green{background:rgba(74,222,128,0.15);color:var(--green)}

    .row{display:flex;gap:10px}
    .row > *{flex:1}

    /* Quick Actions */
    .quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .quick-btn{
      padding:14px 6px;border-radius:12px;border:1px solid var(--card-border);
      background:var(--card);cursor:pointer;display:flex;flex-direction:column;
      align-items:center;gap:5px;transition:all .25s var(--ease);
    }
    .quick-btn:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.12)}
    .quick-btn:active{transform:scale(.95)}
    .quick-btn .q-icon{font-size:20px}
    .quick-btn .q-text{font-size:10px;color:var(--c2);font-family:var(--font);text-align:center;line-height:1.2}
    .quick-btn.active-toggle{border-color:var(--accent);background:rgba(108,140,255,0.08)}
    .quick-btn.active-toggle .q-text{color:var(--accent)}

    /* Presets */
    .preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .preset-chip{
      padding:7px 12px;border-radius:20px;border:1px solid var(--card-border);
      background:rgba(255,255,255,0.03);color:var(--c2);cursor:pointer;
      font-family:var(--font);font-size:12px;transition:all .25s var(--ease);
    }
    .preset-chip:hover{background:rgba(255,255,255,0.08);color:var(--c1);border-color:var(--accent)}
    .preset-chip:active{transform:scale(.95)}

    /* Active Timers List */
    .timer-list{display:flex;flex-direction:column;gap:8px;margin-top:14px}
    .timer-item{
      display:flex;align-items:center;gap:10px;padding:12px 14px;
      border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid var(--card-border);
      animation:itemIn .3s var(--ease);
    }
    @keyframes itemIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .timer-item .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:dotPulse 1.5s ease-in-out infinite}
    .timer-item .dot.ended{background:var(--green);animation:none}
    .timer-item .t-info{flex:1;display:flex;flex-direction:column;gap:2px}
    .timer-item .t-title{font-size:13px;color:var(--c1)}
    .timer-item .t-remain{font-size:12px;color:var(--c2);font-variant-numeric:tabular-nums}
    .timer-item .t-del{
      width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;
      background:rgba(255,107,107,0.1);color:var(--danger);font-size:14px;
      display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;
    }
    .timer-item .t-del:hover{background:rgba(255,107,107,0.2)}
    .timer-item .t-del:active{transform:scale(.9)}
    .no-timers{font-size:13px;color:var(--c3);text-align:center;padding:12px}

    /* Position Grid */
    .pos-section{display:flex;flex-direction:column;gap:14px}
    .pos-group{display:flex;flex-direction:column;gap:8px}
    .pos-label{font-size:13px;color:var(--c2);display:flex;align-items:center;gap:6px}
    .pos-label .emoji{font-size:16px}
    .pos-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:4px;
      background:rgba(255,255,255,0.02);border-radius:12px;padding:4px;
      border:1px solid var(--card-border);aspect-ratio:16/9;
    }
    .pos-cell{
      border-radius:8px;border:none;cursor:pointer;
      background:rgba(255,255,255,0.03);color:var(--c3);
      font-family:var(--font);font-size:9px;
      transition:all .25s var(--ease);display:flex;align-items:center;justify-content:center;
    }
    .pos-cell:hover{background:rgba(255,255,255,0.08);color:var(--c2)}
    .pos-cell:active{transform:scale(.93)}
    .pos-cell.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(108,140,255,0.35)}
    .pos-cell.active-purple{background:var(--accent2);color:#fff;box-shadow:0 2px 12px rgba(167,139,250,0.35)}

    /* Slider */
    .slider-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    .slider-row{display:flex;align-items:center;gap:12px}
    .slider-row input[type="range"]{
      flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);outline:none;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;
      box-shadow:0 2px 8px rgba(108,140,255,0.3);
    }
    .slider-val{font-size:13px;color:var(--c2);min-width:40px;text-align:right;font-variant-numeric:tabular-nums}

    /* Message input */
    .msg-row{display:flex;gap:8px}
    .msg-row .input-field{flex:1}

    /* Toast */
    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
      padding:12px 20px;border-radius:12px;background:rgba(30,30,40,0.95);backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.1);color:var(--c1);font-size:13px;
      transition:transform .4s var(--ease),opacity .4s var(--ease);opacity:0;z-index:100;pointer-events:none;
    }
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

    /* Separator */
    .sep{height:1px;background:var(--card-border);margin:2px 0}
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-dot"></div>
    <h1>Control Remoto</h1>
    <span class="header-sub" id="connStatus">Conectando...</span>
  </div>

  <!-- Quick Actions -->
  <div class="quick-grid">
    <button class="quick-btn" id="btnNextPhoto"><span class="q-icon">⏭️</span><span class="q-text">Siguiente foto</span></button>
    <button class="quick-btn" id="btnPause"><span class="q-icon">⏸️</span><span class="q-text">Pausar fotos</span></button>
    <button class="quick-btn" id="btnFullscreen"><span class="q-icon">⛶</span><span class="q-text">Fullscreen</span></button>
    <button class="quick-btn" id="btnHideWeather"><span class="q-icon">🌤️</span><span class="q-text">Ocultar tiempo</span></button>
    <button class="quick-btn" id="btnMsg"><span class="q-icon">💬</span><span class="q-text">Mensaje</span></button>
    <button class="quick-btn" id="btnClearAll"><span class="q-icon">🗑️</span><span class="q-text">Borrar timers</span></button>
  </div>

  <!-- Message -->
  <div class="card" id="msgCard" style="display:none;">
    <div class="card-title"><span class="icon">💬</span> Mensaje en pantalla</div>
    <div class="msg-row">
      <input class="input-field" type="text" id="msgInput" placeholder="Escribe un mensaje..." maxlength="100">
      <button class="btn btn-primary" style="flex:none;padding:11px 18px" id="btnSendMsg">Enviar</button>
    </div>
    <button class="btn btn-danger btn-sm" style="margin-top:10px;width:100%" id="btnClearMsg">Quitar mensaje</button>
  </div>

  <!-- Timers -->
  <div class="card">
    <div class="card-title"><span class="icon">⏱</span> Temporizadores</div>
    <div class="input-group">
      <label class="input-label">Título</label>
      <input class="input-field" type="text" id="timerTitleInput" placeholder="Ej: Fin del descanso" maxlength="40">
    </div>
    <div class="input-group">
      <label class="input-label">Hora objetivo</label>
      <input class="input-field" type="datetime-local" id="timerTimeInput">
    </div>
    <div class="preset-row">
      <button class="preset-chip" data-mins="1">1 min</button>
      <button class="preset-chip" data-mins="5">5 min</button>
      <button class="preset-chip" data-mins="10">10 min</button>
      <button class="preset-chip" data-mins="15">15 min</button>
      <button class="preset-chip" data-mins="30">30 min</button>
      <button class="preset-chip" data-mins="60">1h</button>
      <button class="preset-chip" data-mins="120">2h</button>
    </div>
    <button class="btn btn-primary" style="width:100%" id="btnAddTimer">＋ Añadir temporizador</button>

    <div class="timer-list" id="timerList">
      <div class="no-timers" id="noTimers">Sin temporizadores activos</div>
    </div>
  </div>

  <!-- Settings -->
  <div class="card">
    <div class="card-title"><span class="icon">⚙️</span> Ajustes</div>
    <div class="slider-group">
      <label class="input-label">Intervalo de fotos</label>
      <div class="slider-row">
        <input type="range" id="intervalSlider" min="10" max="300" value="60" step="5">
        <span class="slider-val" id="intervalVal">60s</span>
      </div>
    </div>
    <div class="slider-group">
      <label class="input-label">Oscurecer pantalla</label>
      <div class="slider-row">
        <input type="range" id="dimSlider" min="0" max="80" value="0" step="5">
        <span class="slider-val" id="dimVal">0%</span>
      </div>
    </div>
  </div>

  <!-- Positions -->
  <div class="card">
    <div class="card-title"><span class="icon">📐</span> Posiciones</div>
    <div class="pos-section">
      <div class="pos-group">
        <div class="pos-label"><span class="emoji">🕐</span> Reloj</div>
        <div class="pos-grid" id="gridClock">
          <button class="pos-cell" data-pos="tl">↖</button><button class="pos-cell" data-pos="tc">↑</button><button class="pos-cell" data-pos="tr">↗</button>
          <button class="pos-cell" data-pos="ml">←</button><button class="pos-cell" data-pos="mc">•</button><button class="pos-cell" data-pos="mr">→</button>
          <button class="pos-cell" data-pos="bl">↙</button><button class="pos-cell" data-pos="bc">↓</button><button class="pos-cell" data-pos="br">↘</button>
        </div>
      </div>
      <div class="pos-group">
        <div class="pos-label"><span class="emoji">⏱</span> Temporizadores</div>
        <div class="pos-grid" id="gridTimer">
          <button class="pos-cell" data-pos="tl">↖</button><button class="pos-cell" data-pos="tc">↑</button><button class="pos-cell" data-pos="tr">↗</button>
          <button class="pos-cell" data-pos="ml">←</button><button class="pos-cell" data-pos="mc">•</button><button class="pos-cell" data-pos="mr">→</button>
          <button class="pos-cell" data-pos="bl">↙</button><button class="pos-cell" data-pos="bc">↓</button><button class="pos-cell" data-pos="br">↘</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
(()=>{
  'use strict';
  firebase.initializeApp({databaseURL:'https://friendly-90c71-default-rtdb.europe-west1.firebasedatabase.app'});
  const db=firebase.database();
  const $=id=>document.getElementById(id);
  const connStatus=$('connStatus');

  db.ref('.info/connected').on('value',s=>{
    connStatus.textContent=s.val()?'Conectado ✓':'Sin conexión';
    connStatus.style.color=s.val()?'#6c8cff':'#ff6b6b';
  });

  // Toast
  let toastT=null;
  function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2000);}

  // Default time
  const timerTitleInput=$('timerTitleInput'),timerTimeInput=$('timerTimeInput');
  function setDefaultTime(){
    const d=new Date(Date.now()+600000);
    timerTimeInput.value=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  }
  setDefaultTime();

  // Presets
  document.querySelectorAll('.preset-chip').forEach(c=>{
    c.addEventListener('click',()=>{
      const mins=parseInt(c.dataset.mins);
      const d=new Date(Date.now()+mins*60000);
      timerTimeInput.value=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
      toast(`Puesto en ${mins} min`);
    });
  });

  // Add timer
  $('btnAddTimer').addEventListener('click',()=>{
    const title=timerTitleInput.value.trim()||'Temporizador';
    const timeVal=timerTimeInput.value;
    if(!timeVal){toast('Selecciona una hora');return;}
    const target=new Date(timeVal).getTime();
    if(target<=Date.now()){toast('La hora ya ha pasado');return;}
    const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    db.ref('timers/'+id).set({active:true,title,targetTime:target});
    timerTitleInput.value='';setDefaultTime();
    toast('Temporizador añadido ✓');
  });

  // Listen to timers
  let intervals={};
  db.ref('timers').on('value',snap=>{
    Object.values(intervals).forEach(clearInterval);intervals={};
    const data=snap.val();
    const list=$('timerList');
    const noTimers=$('noTimers');

    // Remove old items
    list.querySelectorAll('.timer-item').forEach(el=>el.remove());

    if(!data||Object.keys(data).length===0){noTimers.style.display='';return;}
    noTimers.style.display='none';

    Object.entries(data).forEach(([id,t])=>{
      if(!t.active)return;
      const item=document.createElement('div');item.className='timer-item';item.dataset.id=id;
      item.innerHTML=`
        <div class="dot"></div>
        <div class="t-info"><span class="t-title">${t.title||'Temporizador'}</span><span class="t-remain">--:--:--</span></div>
        <button class="t-del">✕</button>`;
      list.appendChild(item);

      const remain=item.querySelector('.t-remain'),dot=item.querySelector('.dot'),del=item.querySelector('.t-del');
      function tick(){
        const r=t.targetTime-Date.now();
        if(r<=0){remain.textContent='¡Finalizado!';remain.style.color='#4ade80';dot.classList.add('ended');}
        else{
          const h=Math.floor(r/3600000),m=Math.floor((r%3600000)/60000),s=Math.floor((r%60000)/1000);
          remain.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} restante`;
          if(r<60000){remain.style.color='#ff6b6b';}else{remain.style.color='';}
        }
      }
      tick();intervals[id]=setInterval(tick,1000);
      del.addEventListener('click',()=>{db.ref('timers/'+id).remove();toast('Eliminado');});
    });
  });

  // Clear all timers
  $('btnClearAll').addEventListener('click',()=>{db.ref('timers').remove();toast('Todos los timers eliminados');});

  // Quick Actions
  $('btnNextPhoto').addEventListener('click',()=>{db.ref('actions/nextPhoto').set(true);toast('Siguiente foto ✓');});
  $('btnFullscreen').addEventListener('click',()=>{db.ref('actions/fullscreen').set(true);toast('Señal enviada');});

  // Pause toggle
  let paused=false;
  db.ref('settings/paused').on('value',s=>{
    paused=!!s.val();
    const btn=$('btnPause');
    btn.classList.toggle('active-toggle',paused);
    btn.querySelector('.q-icon').textContent=paused?'▶️':'⏸️';
    btn.querySelector('.q-text').textContent=paused?'Reanudar':'Pausar fotos';
  });
  $('btnPause').addEventListener('click',()=>{db.ref('settings/paused').set(!paused);toast(paused?'Reanudado':'Pausado');});

  // Weather toggle
  let weatherHidden=false;
  db.ref('settings/hideWeather').on('value',s=>{
    weatherHidden=!!s.val();
    const btn=$('btnHideWeather');
    btn.classList.toggle('active-toggle',weatherHidden);
    btn.querySelector('.q-text').textContent=weatherHidden?'Mostrar tiempo':'Ocultar tiempo';
  });
  $('btnHideWeather').addEventListener('click',()=>{db.ref('settings/hideWeather').set(!weatherHidden);toast(weatherHidden?'Tiempo visible':'Tiempo oculto');});

  // Message
  const msgCard=$('msgCard');
  let msgVisible=false;
  $('btnMsg').addEventListener('click',()=>{msgVisible=!msgVisible;msgCard.style.display=msgVisible?'':'none';});
  $('btnSendMsg').addEventListener('click',()=>{
    const txt=$('msgInput').value.trim();
    if(!txt){toast('Escribe algo');return;}
    db.ref('message').set({active:true,text:txt});toast('Mensaje enviado ✓');
  });
  $('btnClearMsg').addEventListener('click',()=>{db.ref('message').set({active:false,text:''});$('msgInput').value='';toast('Mensaje quitado');});

  // Sliders
  const intervalSlider=$('intervalSlider'),intervalVal=$('intervalVal');
  db.ref('settings/photoInterval').on('value',s=>{
    const v=s.val();if(v){const sec=Math.round(v/1000);intervalSlider.value=sec;intervalVal.textContent=sec>=60?(sec/60)+'m':sec+'s';}
  });
  intervalSlider.addEventListener('input',()=>{
    const sec=parseInt(intervalSlider.value);
    intervalVal.textContent=sec>=60?(sec/60)+'m':sec+'s';
  });
  intervalSlider.addEventListener('change',()=>{
    const sec=parseInt(intervalSlider.value);
    db.ref('settings/photoInterval').set(sec*1000);toast(`Intervalo: ${sec>=60?(sec/60)+' min':sec+'s'}`);
  });

  const dimSlider=$('dimSlider'),dimVal=$('dimVal');
  db.ref('settings/dim').on('value',s=>{const v=s.val()||0;dimSlider.value=v;dimVal.textContent=v+'%';});
  dimSlider.addEventListener('input',()=>{dimVal.textContent=dimSlider.value+'%';});
  dimSlider.addEventListener('change',()=>{db.ref('settings/dim').set(parseInt(dimSlider.value));toast(`Oscuridad: ${dimSlider.value}%`);});

  // Positions
  function setupGrid(gridId,fbPath,activeClass){
    const grid=$(gridId),cells=grid.querySelectorAll('.pos-cell');
    db.ref(fbPath).on('value',s=>{
      const pos=s.val()||(fbPath.includes('clock')?'bl':'tr');
      cells.forEach(c=>{c.classList.remove('active','active-purple');if(c.dataset.pos===pos)c.classList.add(activeClass);});
    });
    cells.forEach(cell=>{cell.addEventListener('click',()=>{db.ref(fbPath).set(cell.dataset.pos);toast('Posición actualizada');});});
  }
  setupGrid('gridClock','positions/clock','active');
  setupGrid('gridTimer','positions/timer','active-purple');
})();
</script>
</body>
</html>
